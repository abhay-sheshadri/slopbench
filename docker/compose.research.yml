# Research container — Python, PyTorch, MIG slice, pre-downloaded models.
# Usage: sandbox=("docker", "docker/compose.research.yml")
#
# VRAM is hardware-capped via MIG. Each container is pinned to a single
# 3g.40gb MIG slice (40GB) by setting NVIDIA_VISIBLE_DEVICES to the slice
# UUID. The UUID comes from sample metadata via Inspect's
# SAMPLE_METADATA_<KEY> compose-env interpolation; the orchestrator assigns
# one MIG UUID per sample.
#
# To enable MIG and create slices: bash scripts/enable_mig.sh

services:
  default:
    image: agent-research
    x-local: true
    command: "tail -f /dev/null"
    init: true
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=${SAMPLE_METADATA_MIG_UUID:?MIG_UUID metadata required on Sample (run.py allocates these from .mig_uuids)}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
